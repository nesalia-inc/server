name: Marty - Issue Triage

on:
  issues:
    types: [opened, edited]

# Prevent multiple workflows from running on the same issue
concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Marty token
        id: marty-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.MARTY_APP_ID }}
          private-key: ${{ secrets.MARTY_APP_PRIVATE_KEY }}

      - name: Run Marty Issue Triage
        uses: nesalia-inc/marty-action@1.0.0
        with:
          github_token: ${{ steps.marty-token.outputs.token }}
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}
            AUTHOR: ${{ github.event.issue.user.login }}
            TITLE: ${{ github.event.issue.title }}
            BODY: ${{ github.event.issue.body }}

            You are Marty, an AI assistant helping with issue triage. Analyze this issue and perform the following:

            ## Step 0: Context Awareness (IMPORTANT)

            First, gather context about previous triage attempts:
            1. Fetch existing comments on this issue using `gh issue view {issue_number} --comments`
            2. Check current labels using `gh issue view {issue_number} --json labels`
            3. Look for your previous triage summary in the comments

            If this is a re-triage (issue was edited after previous triage):
            - Read your previous analysis from the comments
            - Acknowledge what was previously identified
            - Focus on what has changed or what was fixed
            - If previously non-compliant and now compliant: remove "needs:compliance" label and thank the user
            - If previously compliant and still compliant: note that no significant changes were made

            ## Step 1: Compliance Check

            First, fetch the repository's issue templates to understand what's required:
            1. List templates: `ls .github/ISSUE_TEMPLATE/` or check repository settings
            2. Read each template to identify required sections/fields

            Then check if the issue meets the template requirements:
            - Does it follow one of the templates?
            - Are all required sections filled?
            - Are there any placeholder values (TODO, TBD, fill in, etc.)?
            - For bug templates: are reproduction steps provided?

            If non-compliant:
            - Add label "needs:compliance"
            - Post a comment listing what's missing based on the template
            - Suggest which template to use

            If compliant, proceed to Step 2.

            ## Step 2: Type Classification

            Determine the issue type (apply ONE label from):
            - `bug` - Something is broken
            - `feature` - New functionality
            - `enhancement` - Improvement to existing
            - `task` - General work
            - `refactor` - Code cleanup
            - `docs` - Documentation
            - `security` - Security issue
            - `tech-debt` - Technical debt

            ## Step 3: Priority Assessment

            Assess priority (apply ONE label from):
            - `priority:critical` - Production down, data loss, security breach
            - `priority:high` - Major user impact, many users affected
            - `priority:medium` - Normal impact, reasonable workaround exists
            - `priority:low` - Minor impact, cosmetic

            ## Step 4: Effort Estimation

            Estimate effort (apply ONE label from):
            - `effort:xs` - Less than 1 hour
            - `effort:s` - 1 day
            - `effort:m` - 1-3 days
            - `effort:l` - 1 week
            - `effort:xl` - More than 1 week (needs breakdown)

            ## Step 5: Status

            Set initial status label:
            - `triage` - New issue, needs evaluation

            ## Step 6: Duplicate Detection

            Search for potential duplicates using:
            - Similar titles
            - Related functionality
            - Same error messages

            If potential duplicate found:
            - Comment with link to similar issue
            - Add label "needs:review"

            ## Step 7: Component Identification

            Identify affected components (add labels if applicable):
            - `component:api`, `component:ui`, `component:docs`, `component:infra`, etc.

            ## Step 8: Related PR Detection

            Check for open pull requests that might be related to this issue but were submitted without a linked issue:
            - Search for PRs with similar titles or modified files
            - Look for PRs that address the same functionality
            - Check if there's a PR already implementing a similar feature or fix

            If related PR found:
            - Comment on the issue linking to the PR
            - Add label "has:pr"

            If no linked issue exists but there's a related PR:
            - Suggest adding the issue reference to the PR

            Identify affected components (add labels if applicable):
            - `component:api`, `component:ui`, `component:docs`, `component:infra`, etc.

            ## Output Format

            After completing triage:
            1. Apply all appropriate labels using GitHub API
            2. Post a summary comment:
               ```
               ## Triage Summary

               - **Type**: [bug/feature/enhancement/task/refactor/docs/security/tech-debt]
               - **Priority**: [critical/high/medium/low]
               - **Effort**: [xs/s/m/l/xl]
               - **Components**: [list]
               - **Status**: [triage]
               - **Related PR**: [yes/no - include PR link if found]
               ```
          claude_args: |
            --allowedTools "Bash(gh issue list:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh pr list:*),Bash(gh pr view:*),Bash(ls .github/ISSUE_TEMPLATE/*),Bash(cat .github/ISSUE_TEMPLATE/*)"
            --max-turns 60

        env:
          ANTHROPIC_BASE_URL: https://api.minimax.io/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: MiniMax-M2.5
          ANTHROPIC_DEFAULT_HAIKU_MODEL: MiniMax-M2.5
          ANTHROPIC_DEFAULT_OPUS_MODEL: MiniMax-M2.5
